<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silence's Overlay Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0d0f;
  --panel:#17171b;
  --panel2:#222229;
  --panel3:#2d2d35;
  --border:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:rgba(255,255,255,.67);
  --accent:#00aaff;
  --orange:#ff7a00;
  --good:#20b15a;
  --danger:#d93636;
  --warning:#ffb020;
  --checker1:#2c2c2c;
  --checker2:#1c1c1c;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  color:var(--text);
  font-family:Inter, Arial, sans-serif;
}

button,input,select,textarea{
  font-family:Inter, Arial, sans-serif;
}

#app{
  width:100vw;
  height:100vh;
  display:flex;
  background:var(--bg);
}

/* ======================
   EDITOR
====================== */

#editor{
  width:470px;
  min-width:470px;
  height:100vh;
  overflow-y:auto;
  background:
    radial-gradient(circle at top left, rgba(0,170,255,.18), transparent 32%),
    radial-gradient(circle at top right, rgba(255,122,0,.13), transparent 34%),
    linear-gradient(180deg,#17171b,#101013);
  border-right:2px solid var(--border);
  padding:16px;
}

#editor::-webkit-scrollbar{
  width:10px;
}

#editor::-webkit-scrollbar-track{
  background:#111;
}

#editor::-webkit-scrollbar-thumb{
  background:#444;
  border-radius:999px;
}

.appTitle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

h1{
  margin:0;
  font-size:25px;
  line-height:1;
  font-weight:900;
}

.badge{
  font-size:11px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(0,170,255,.14);
  color:#62d1ff;
  border:1px solid rgba(98,209,255,.35);
  white-space:nowrap;
}

.section{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:12px;
  margin-bottom:14px;
  box-shadow:0 16px 34px rgba(0,0,0,.18);
}

.sectionTitle{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:900;
  color:rgba(255,255,255,.78);
  margin:0 0 10px;
}

label{
  display:block;
  margin-top:8px;
  font-size:12px;
  font-weight:800;
  opacity:.92;
}

input,select,textarea,button{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

input,select,textarea{
  background:#292932;
  color:white;
  outline:1px solid transparent;
}

textarea{
  min-height:78px;
  resize:vertical;
}

input:focus,select:focus,textarea:focus{
  outline:2px solid rgba(0,170,255,.55);
}

input[type="color"]{
  height:42px;
  padding:4px;
  cursor:pointer;
}

input[type="range"]{
  padding:0;
  accent-color:var(--accent);
}

button{
  background:linear-gradient(135deg,var(--accent),#006eff);
  color:white;
  font-weight:900;
  cursor:pointer;
  transition:transform .12s ease, filter .12s ease;
}

button:hover{
  filter:brightness(1.08);
}

button:active{
  transform:scale(.98);
}

button.good{
  background:linear-gradient(135deg,#20b15a,#09883d);
}

button.danger{
  background:linear-gradient(135deg,#e64545,#ad2020);
}

button.warning{
  background:linear-gradient(135deg,#ffcc42,#ff8c00);
  color:#111;
}

button.dark{
  background:#34343d;
}

button.small{
  font-size:12px;
  padding:8px;
  margin:4px 0;
}

button.ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,.18);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.row3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.help{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  margin:4px 0 8px;
}

.statusLine{
  font-size:12px;
  color:rgba(255,255,255,.7);
  background:rgba(0,0,0,.20);
  border:1px solid rgba(255,255,255,.08);
  padding:8px;
  border-radius:10px;
  word-break:break-word;
  margin-bottom:10px;
}

.hiddenFile{
  position:absolute;
  left:-9999px;
  width:1px;
  height:1px;
  opacity:0;
}

.slideBox{
  background:rgba(32,32,38,.98);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:12px;
  margin-bottom:14px;
  box-shadow:0 18px 34px rgba(0,0,0,.22);
}

.slideHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}

.slideHeader strong{
  font-size:14px;
}

.slideTag{
  max-width:220px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:11px;
  color:rgba(255,255,255,.75);
  background:rgba(255,255,255,.08);
  padding:4px 8px;
  border-radius:999px;
}

.thumb{
  width:100%;
  height:130px;
  object-fit:contain;
  background:#050505;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  margin-bottom:10px;
}

.rangeValue{
  float:right;
  opacity:.7;
  font-size:11px;
}

.previewButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.previewButtons button{
  margin:0 0 8px;
  padding:8px 5px;
  font-size:11px;
}

/* ======================
   OVERLAY AREA
====================== */

#overlayArea{
  flex:1;
  position:relative;
  overflow:hidden;
  background:transparent;
}

#stageGuide{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.24;
  display:none;
  z-index:8;
  background:
    linear-gradient(to right, transparent calc(50% - 1px), rgba(255,255,255,.6) calc(50% - 1px), rgba(255,255,255,.6) calc(50% + 1px), transparent calc(50% + 1px)),
    linear-gradient(to bottom, transparent calc(50% - 1px), rgba(255,255,255,.6) calc(50% - 1px), rgba(255,255,255,.6) calc(50% + 1px), transparent calc(50% + 1px));
}

body.showGuides #stageGuide{
  display:block;
}

#overlayArea.previewBlack{
  background:#000;
}

#overlayArea.previewGreen{
  background:#00b140;
}

#overlayArea.previewTransparent{
  background:transparent;
}

#overlayArea.previewChecker{
  background-color:var(--checker1);
  background-image:
    linear-gradient(45deg,var(--checker2) 25%,transparent 25%),
    linear-gradient(-45deg,var(--checker2) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,var(--checker2) 75%),
    linear-gradient(-45deg,transparent 75%,var(--checker2) 75%);
  background-size:40px 40px;
  background-position:0 0,0 20px,20px -20px,-20px 0;
}

#overlayContent{
  position:absolute;
  inset:0;
  opacity:1;
  transition:opacity .45s ease-in-out;
  pointer-events:auto;
}

#animWrap{
  position:absolute;
  inset:0;
  transform-origin:center center;
}

.editBox{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  transform-origin:center center;
  touch-action:none;
  user-select:none;
  pointer-events:auto;
}

.editBox.selected::after{
  content:"";
  position:absolute;
  inset:-8px;
  border:2px solid rgba(0,170,255,.95);
  border-radius:8px;
  box-shadow:0 0 0 1px rgba(0,0,0,.7), 0 0 18px rgba(0,170,255,.35);
  pointer-events:none;
}

.resizeHandle{
  position:absolute;
  width:15px;
  height:15px;
  background:#ffffff;
  border:2px solid #00aaff;
  border-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.55);
  z-index:20;
  display:none;
}

.editBox.selected .resizeHandle{
  display:block;
}

.resizeHandle.nw{left:-15px;top:-15px;cursor:nwse-resize}
.resizeHandle.n{left:50%;top:-15px;transform:translateX(-50%);cursor:ns-resize}
.resizeHandle.ne{right:-15px;top:-15px;cursor:nesw-resize}
.resizeHandle.e{right:-15px;top:50%;transform:translateY(-50%);cursor:ew-resize}
.resizeHandle.se{right:-15px;bottom:-15px;cursor:nwse-resize}
.resizeHandle.s{left:50%;bottom:-15px;transform:translateX(-50%);cursor:ns-resize}
.resizeHandle.sw{left:-15px;bottom:-15px;cursor:nesw-resize}
.resizeHandle.w{left:-15px;top:50%;transform:translateY(-50%);cursor:ew-resize}

.imageEditBox{
  width:360px;
  min-width:40px;
  min-height:40px;
}

#overlayImage{
  display:block;
  width:100%;
  height:auto;
  max-width:none;
  max-height:none;
  object-fit:contain;
  transform-origin:center center;
  user-select:none;
  pointer-events:none;
}

.textEditBox{
  width:max-content;
  min-width:20px;
}

#overlayText{
  position:relative;
  font-family:'Luckiest Guy', cursive;
  font-size:72px;
  line-height:1;
  letter-spacing:2px;
  color:white;
  -webkit-text-stroke:3px black;
  paint-order:stroke fill;
  white-space:nowrap;
  user-select:none;
  pointer-events:none;
  text-align:center;
  max-width:none;
}

body.overlayOnly #overlayContent{
  pointer-events:none;
}

body.overlayOnly .editBox::after,
body.overlayOnly .resizeHandle{
  display:none !important;
}

/* ======================
   TEXT STYLES
====================== */

.solid{
  color:var(--textColor);
  -webkit-text-fill-color:var(--textColor);
  text-shadow:none;
}

.rainbow{
  background-image:linear-gradient(
    90deg,
    #ff0000 0%,
    #ff9900 16%,
    #ffff00 32%,
    #00ff66 48%,
    #00ccff 64%,
    #6633ff 80%,
    #ff00ff 100%
  );
  background-size:300% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  animation:rainbowMove 3s linear infinite;
}

.aurora{
  background-image:linear-gradient(
    120deg,
    #00eaff 0%,
    #71ffb8 25%,
    #ffffff 40%,
    #b56cff 60%,
    #ff8cff 80%,
    #00aaff 100%
  );
  background-size:300% 300%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  animation:auroraFlow 4s ease-in-out infinite;
}

.fireText{
  background-image:linear-gradient(180deg,#fff7a8 0%,#ff9a00 35%,#ff3300 70%,#7a0000 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 18px rgba(255,87,0,.26);
}

.iceText{
  background-image:linear-gradient(180deg,#ffffff 0%,#b9f7ff 45%,#20bdff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 16px rgba(0,234,255,.26);
}

.goldText{
  background-image:linear-gradient(180deg,#fff7bf 0%,#ffd15a 45%,#b87300 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 16px rgba(255,190,40,.25);
}

@keyframes rainbowMove{
  0%{background-position:0% 50%}
  100%{background-position:300% 50%}
}

@keyframes auroraFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ======================
   ENTRANCE ANIMATIONS
====================== */

.animFade{
  animation:animFade .7s ease both;
}

.animPop{
  animation:animPop .65s cubic-bezier(.17,.89,.32,1.35) both;
}

.animBounce{
  animation:animBounce .9s ease both;
}

.animSpin{
  animation:animSpin .8s ease both;
}

.animShake{
  animation:animShake .55s ease both;
}

.animSlideUp{
  animation:animSlideUp .7s ease both;
}

.animFirePulse{
  animation:animFirePulse 1s ease both;
}

.animElectric{
  animation:animElectric .9s steps(2,end) both;
}

@keyframes animFade{
  from{opacity:0}
  to{opacity:1}
}

@keyframes animPop{
  0%{opacity:0;transform:scale(.35)}
  75%{opacity:1;transform:scale(1.08)}
  100%{opacity:1;transform:scale(1)}
}

@keyframes animBounce{
  0%{opacity:0;transform:translateY(-90px) scale(.75)}
  45%{opacity:1;transform:translateY(18px) scale(1.03)}
  70%{transform:translateY(-10px) scale(.99)}
  100%{transform:translateY(0) scale(1)}
}

@keyframes animSpin{
  0%{opacity:0;transform:rotate(-260deg) scale(.2)}
  100%{opacity:1;transform:rotate(0deg) scale(1)}
}

@keyframes animShake{
  0%{opacity:0;transform:translateX(0)}
  15%{opacity:1;transform:translateX(-18px)}
  30%{transform:translateX(18px)}
  45%{transform:translateX(-14px)}
  60%{transform:translateX(14px)}
  75%{transform:translateX(-8px)}
  100%{opacity:1;transform:translateX(0)}
}

@keyframes animSlideUp{
  0%{opacity:0;transform:translateY(120px)}
  100%{opacity:1;transform:translateY(0)}
}

@keyframes animFirePulse{
  0%{opacity:0;filter:brightness(1) drop-shadow(0 0 0 rgba(255,90,0,0));transform:scale(.7)}
  40%{opacity:1;filter:brightness(1.35) drop-shadow(0 0 25px rgba(255,90,0,.8));transform:scale(1.08)}
  100%{opacity:1;filter:brightness(1) drop-shadow(0 0 8px rgba(255,90,0,.25));transform:scale(1)}
}

@keyframes animElectric{
  0%{opacity:0;filter:brightness(1);transform:translate(0,0) scale(.9)}
  20%{opacity:1;filter:brightness(1.8) drop-shadow(0 0 20px rgba(0,170,255,.9));transform:translate(-6px,4px) scale(1.04)}
  40%{filter:brightness(1.2);transform:translate(5px,-5px) scale(.98)}
  60%{filter:brightness(2) drop-shadow(0 0 22px rgba(255,255,255,.7));transform:translate(-3px,-2px) scale(1.03)}
  100%{opacity:1;filter:brightness(1);transform:translate(0,0) scale(1)}
}

/* ======================
   THEMES
====================== */

.themeGlowBlueOrange #overlayImage{
  filter:drop-shadow(0 0 25px rgba(0,170,255,.55)) drop-shadow(0 0 18px rgba(255,122,0,.40));
}

.themeGlowBlueOrange #overlayText{
  filter:drop-shadow(0 0 8px rgba(0,170,255,.30)) drop-shadow(0 0 8px rgba(255,122,0,.25));
}

.themeNeonGreenPurple #overlayImage{
  filter:drop-shadow(0 0 26px rgba(0,255,150,.58)) drop-shadow(0 0 20px rgba(180,0,255,.45));
}

.themeNeonGreenPurple #overlayText{
  filter:drop-shadow(0 0 10px rgba(0,255,150,.35)) drop-shadow(0 0 8px rgba(180,0,255,.35));
}

.themeGoldVIP #overlayImage{
  filter:drop-shadow(0 0 28px rgba(255,200,55,.62));
}

.themeGoldVIP #overlayText{
  filter:drop-shadow(0 0 12px rgba(255,200,55,.45));
}

.themeFire #overlayImage{
  filter:drop-shadow(0 0 30px rgba(255,90,0,.64));
}

.themeFire #overlayText{
  filter:drop-shadow(0 0 12px rgba(255,90,0,.48));
}

.themeIce #overlayImage{
  filter:drop-shadow(0 0 28px rgba(0,225,255,.62));
}

.themeIce #overlayText{
  filter:drop-shadow(0 0 12px rgba(0,225,255,.42));
}

.themeNone #overlayImage,
.themeNone #overlayText{
  filter:none;
}

/* ======================
   OVERLAY ONLY
====================== */

body.overlayOnly #editor{
  display:none;
}

body.overlayOnly #app{
  display:block;
  background:transparent;
}

body.overlayOnly #overlayArea{
  width:100vw;
  height:100vh;
}

body.overlayOnly #overlayArea.previewBlack,
body.overlayOnly #overlayArea.previewGreen,
body.overlayOnly #overlayArea.previewChecker{
  background:transparent;
}

/* ======================
   RESPONSIVE
====================== */

@media(max-width:900px){
  html,body{
    overflow:auto;
  }

  #app{
    display:block;
    overflow:auto;
    min-height:100vh;
    height:auto;
  }

  #editor{
    width:100%;
    min-width:0;
    height:auto;
    border-right:none;
    border-bottom:2px solid var(--border);
  }

  #overlayArea{
    height:58vh;
    min-height:420px;
  }
}
</style>
</head>

<body>

<div id="app">

  <div id="editor">

    <div class="appTitle">
      <h1>Silence's Overlay Maker</h1>
      <span class="badge">Streamer App</span>
    </div>

    <div class="section">
      <p class="sectionTitle">Preset</p>

      <label>Preset Name</label>
      <input id="presetName" placeholder="Example: Rocket League Gifts" oninput="markDirty()">

      <div class="row">
        <button class="good" onclick="savePreset()">Save Preset</button>
        <button onclick="addSlide()">Add Slide</button>
      </div>

      <label>Load Preset</label>
      <select id="presetSelect" onchange="loadPreset(this.value)">
        <option value="">Select preset...</option>
      </select>

      <div class="row">
        <button class="warning" onclick="exportCurrentPreset()">Export JSON</button>
        <button class="warning" onclick="document.getElementById('importFile').click()">Import JSON</button>
      </div>

      <input id="importFile" class="hiddenFile" type="file" accept="application/json,.json" onchange="importPreset(event)">

      <button class="danger" onclick="deleteCurrentPreset()">Delete Current Preset</button>

      <div id="saveStatus" class="statusLine">Autosave ready.</div>
    </div>

    <div class="section">
      <p class="sectionTitle">Overlay Controls</p>

      <div class="row">
        <button onclick="startOverlay()">Start Rotation</button>
        <button class="dark" onclick="stopOverlay()">Stop Rotation</button>
      </div>

      <label>Seconds Per Slide <span id="speedValue" class="rangeValue">5</span></label>
      <input id="speedInput" type="range" value="5" min="1" max="60" oninput="updateSpeed(this.value)">

      <label>Global Theme</label>
      <select id="themeSelect" onchange="updateTheme(this.value)">
        <option value="themeGlowBlueOrange">Silence Blue / Orange</option>
        <option value="themeNeonGreenPurple">Neon Green / Purple</option>
        <option value="themeGoldVIP">Gold VIP</option>
        <option value="themeFire">Fire</option>
        <option value="themeIce">Ice</option>
        <option value="themeNone">Clean / No Glow</option>
      </select>

      <label>Preview Background</label>
      <div class="previewButtons">
        <button class="ghost" onclick="setPreview('previewTransparent')">Clear</button>
        <button class="ghost" onclick="setPreview('previewBlack')">Black</button>
        <button class="ghost" onclick="setPreview('previewGreen')">Green</button>
        <button class="ghost" onclick="setPreview('previewChecker')">Checker</button>
      </div>

      <div class="row">
        <button class="dark" onclick="toggleOverlayOnly()">Overlay Only</button>
        <button class="dark" onclick="toggleGuides()">Guides</button>
      </div>

      <button onclick="copyOverlayLink()">Copy Overlay URL</button>

      <p class="help">
        For OBS/TikTok Studio: save a preset, copy the overlay URL, then use that URL as a browser source.
      </p>
    </div>

    <div id="slidesContainer"></div>

  </div>

  <div id="overlayArea" class="previewChecker">
    <div id="stageGuide"></div>

    <div id="overlayContent" class="themeGlowBlueOrange">
      <div id="animWrap">
        <div id="imageBox" class="editBox imageEditBox" data-edit-target="image">
          <img id="overlayImage" alt="">
        </div>

        <div id="textBox" class="editBox textEditBox" data-edit-target="text">
          <div id="overlayText" class="solid"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let db;
let slides = [];
let currentIndex = 0;
let rotationTimer = null;
let autosaveTimer = null;
let isLoadingPreset = false;

const DB_NAME = "SILENCE_OVERLAY_MAKER_DB";
const DB_VERSION = 1;
const STORE_NAME = "presets";

const overlayArea = document.getElementById("overlayArea");
const overlayContent = document.getElementById("overlayContent");
const animWrap = document.getElementById("animWrap");
const imageBox = document.getElementById("imageBox");
const textBox = document.getElementById("textBox");
const overlayImage = document.getElementById("overlayImage");
const overlayText = document.getElementById("overlayText");
const speedInput = document.getElementById("speedInput");
const speedValue = document.getElementById("speedValue");
const themeSelect = document.getElementById("themeSelect");
const saveStatus = document.getElementById("saveStatus");

function defaultSlide(){
  return {
    giftName:"New Gift",
    image:"",
    fileName:"",
    text:"Tickle",
    effect:"solid",
    color:"#57fff4",
    stroke:3,
    x:50,
    y:82,
    imageX:50,
    imageY:45,
    imageSize:360,
    textSize:72,
    animation:"animPop",
    duration:0
  };
}

function normalizeSlide(slide){
  const base = defaultSlide();
  return Object.assign(base, slide || {});
}

function openDatabase(){
  return new Promise((resolve,reject)=>{
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = function(event){
      db = event.target.result;

      if(!db.objectStoreNames.contains(STORE_NAME)){
        db.createObjectStore(STORE_NAME, {keyPath:"name"});
      }
    };

    request.onsuccess = function(event){
      db = event.target.result;
      resolve();
    };

    request.onerror = function(){
      reject(request.error);
    };
  });
}

function savePresetToDB(preset){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.put(preset);

    tx.oncomplete = resolve;
    tx.onerror = ()=>reject(tx.error);
  });
}

function getPresetFromDB(name){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.get(name);

    request.onsuccess = ()=>resolve(request.result);
    request.onerror = ()=>reject(request.error);
  });
}

function getAllPresetsFromDB(){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.getAll();

    request.onsuccess = ()=>resolve(request.result || []);
    request.onerror = ()=>reject(request.error);
  });
}

function deletePresetFromDB(name){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.delete(name);

    tx.oncomplete = resolve;
    tx.onerror = ()=>reject(tx.error);
  });
}

function removeSlide(index){
  slides.splice(index,1);

  if(slides.length === 0){
    slides.push(defaultSlide());
  }

  if(currentIndex >= slides.length){
    currentIndex = slides.length - 1;
  }

  if(currentIndex < 0){
    currentIndex = 0;
  }

  renderSlides();
  showSlide(currentIndex, true);
  markDirty();
}

function duplicateSlide(index){
  const copy = JSON.parse(JSON.stringify(slides[index]));
  copy.giftName = (copy.giftName || "Slide") + " Copy";

  slides.splice(index + 1, 0, copy);
  currentIndex = index + 1;

  renderSlides();
  showSlide(currentIndex, true);
  markDirty();
}

function moveSlideUp(index){
  if(index <= 0) return;

  const temp = slides[index];
  slides[index] = slides[index - 1];
  slides[index - 1] = temp;

  currentIndex = index - 1;

  renderSlides();
  showSlide(currentIndex, true);
  markDirty();
}

function moveSlideDown(index){
  if(index >= slides.length - 1) return;

  const temp = slides[index];
  slides[index] = slides[index + 1];
  slides[index + 1] = temp;

  currentIndex = index + 1;

  renderSlides();
  showSlide(currentIndex, true);
  markDirty();
}

function startOverlay(){
  if(slides.length === 0) return;

  clearTimeout(rotationTimer);
  rotationTimer = null;

  currentIndex = 0;
  showSlide(currentIndex, true);
  scheduleNextSlide();
}

function scheduleNextSlide(){
  clearTimeout(rotationTimer);

  const currentSlide = slides[currentIndex] || {};
  const globalSeconds = Number(speedInput.value) || 5;
  const slideSeconds = Number(currentSlide.duration) || globalSeconds;

  rotationTimer = setTimeout(()=>{
    overlayContent.style.opacity = 0;

    setTimeout(()=>{
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex, true);
      overlayContent.style.opacity = 1;
      scheduleNextSlide();
    },450);

  },slideSeconds * 1000);
}

function stopOverlay(){
  clearTimeout(rotationTimer);
  rotationTimer = null;
}

function showSlide(index,restartAnimation){
  if(slides.length === 0){
    overlayImage.src = "";
    overlayText.textContent = "";
    return;
  }

  const slide = normalizeSlide(slides[index]);
  slides[index] = slide;

  overlayImage.src = slide.image || "";
  overlayText.textContent = slide.text || "";

  overlayText.className = "";
  overlayText.classList.add(slide.effect || "solid");

  imageBox.style.left = slide.imageX + "%";
  imageBox.style.top = slide.imageY + "%";
  imageBox.style.width = slide.imageSize + "px";

  textBox.style.left = slide.x + "%";
  textBox.style.top = slide.y + "%";
  overlayText.style.fontSize = slide.textSize + "px";
  overlayText.style.webkitTextStroke = slide.stroke + "px black";
  overlayText.style.setProperty("--textColor", slide.color || "#57fff4");

  if(slide.effect === "solid"){
    overlayText.style.color = slide.color || "#57fff4";
    overlayText.style.webkitTextFillColor = slide.color || "#57fff4";
  }else{
    overlayText.style.color = "transparent";
    overlayText.style.webkitTextFillColor = "transparent";
  }

  if(restartAnimation){
    animWrap.className = "";
    void animWrap.offsetWidth;
    animWrap.classList.add(slide.animation || "animPop");
  }
}

async function savePreset(){
  const nameInput = document.getElementById("presetName");
  const name = nameInput.value.trim();

  if(!name){
    alert("Type a preset name first.");
    return;
  }

  const presetData = {
    name:name,
    version:1,
    settings:getSettings(),
    slides:slides.map(normalizeSlide),
    savedAt:Date.now()
  };

  try{
    await savePresetToDB(presetData);
    localStorage.setItem("SILENCE_LAST_PRESET", name);
    await loadPresetList();

    document.getElementById("presetSelect").value = name;
    saveStatus.textContent = "Saved: " + name;
  }catch(err){
    console.error(err);
    alert("Save failed. The images may be too large. Try smaller PNGs or export as JSON.");
  }
}

async function autoSave(){

  if(!name || isLoadingPreset) return;

  const presetData = {
    name:name,
    version:1,
    settings:getSettings(),
    slides:slides.map(normalizeSlide),

  };

  }catch(err){

}

function markDirty(){
  if(isLoadingPreset) return;

  saveStatus.textContent = "Unsaved changes... autosaving";

  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(autoSave, 650);
}

async function loadPresetList(){
  const select = document.getElementById("presetSelect");
  const currentValue = select.value;

  select.innerHTML = `<option value="">Select preset...</option>`;

  const presets = await getAllPresetsFromDB();

  presets
    .map(p=>p.name)
    .sort()
    .forEach(name=>{
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      select.appendChild(option);
    });

  if(presets.some(p=>p.name === currentValue)){
    select.value = currentValue;
  }
}

async function loadPreset(name){
  if(!name) return;

  isLoadingPreset = true;

  const presetData = await getPresetFromDB(name);

  if(!presetData){
    isLoadingPreset = false;
    alert("Preset not found.");
    return;
  }

  document.getElementById("presetName").value = presetData.name || name;

  if(presetData.settings){
    setSettings(presetData.settings);
  }

  slides = (presetData.slides || []).map(normalizeSlide);

  if(slides.length === 0){
    slides.push(defaultSlide());
  }

  currentIndex = 0;
  localStorage.setItem("SILENCE_LAST_PRESET", presetData.name || name);

  renderSlides();
  showSlide(currentIndex, true);

  saveStatus.textContent = "Loaded: " + (presetData.name || name);

  isLoadingPreset = false;
}

async function deleteCurrentPreset(){
  const name = document.getElementById("presetName").value.trim();

  if(!name){
    alert("Type or load a preset name first.");
    return;
  }

  if(!confirm("Delete preset: " + name + "?")) return;

  await deletePresetFromDB(name);

  if(localStorage.getItem("SILENCE_LAST_PRESET") === name){
    localStorage.removeItem("SILENCE_LAST_PRESET");
  }

  document.getElementById("presetName").value = "";
  slides = [defaultSlide()];
  currentIndex = 0;

  renderSlides();
  showSlide(currentIndex, true);
  await loadPresetList();

  saveStatus.textContent = "Preset deleted.";
}

function exportCurrentPreset(){
  const name = document.getElementById("presetName").value.trim() || "Silence Overlay Preset";

  const presetData = {
    name:name,
    version:1,
    settings:getSettings(),
    slides:slides.map(normalizeSlide),
    exportedAt:new Date().toISOString()
  };

  const blob = new Blob([JSON.stringify(presetData,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = safeFileName(name) + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function importPreset(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(e){
    try{
      const presetData = JSON.parse(e.target.result);

      if(!presetData.slides || !Array.isArray(presetData.slides)){
        alert("That JSON does not look like a Silence overlay preset.");
        return;
      }

      const importedName = presetData.name || file.name.replace(/\.json$/i,"");
      presetData.name = importedName;
      presetData.version = 1;
      presetData.settings = presetData.settings || getSettings();
      presetData.slides = presetData.slides.map(normalizeSlide);
      presetData.savedAt = Date.now();

      await savePresetToDB(presetData);
      await loadPresetList();
      await loadPreset(importedName);

      alert("Imported preset: " + importedName);
    }catch(err){
      console.error(err);
      alert("Import failed. Make sure it is a valid JSON preset.");
    }

    event.target.value = "";
  };

  reader.readAsText(file);
}

function clamp(value,min,max){
  return Math.max(min, Math.min(max, value));
}

function addResizeHandles(box){

let activeEditTarget = "image";
let editAction = null;

function selectEditTarget(target){
  activeEditTarget = target;
  imageBox.classList.toggle("selected", target === "image");
  textBox.classList.toggle("selected", target === "text");
}

function getBoxForTarget(target){
  return target === "image" ? imageBox : textBox;
}

function getCurrentSlide(){
  if(slides.length === 0) return null;
  slides[currentIndex] = normalizeSlide(slides[currentIndex]);
  return slides[currentIndex];
}

function beginEditPointer(event,target){
  if(document.body.classList.contains("overlayOnly")) return;

  event.preventDefault();
  event.stopPropagation();

  selectEditTarget(target);

  const slide = getCurrentSlide();
  if(!slide) return;

  const handle = event.target.dataset.handle || "";
  const areaRect = overlayArea.getBoundingClientRect();

  editAction = {
    target:target,
    handle:handle,
    mode:handle ? "resize" : "drag",
    startClientX:event.clientX,
    startClientY:event.clientY,
    areaWidth:areaRect.width,
    areaHeight:areaRect.height,
    startX:target === "image" ? Number(slide.imageX) : Number(slide.x),
    startY:target === "image" ? Number(slide.imageY) : Number(slide.y),
    startImageSize:Number(slide.imageSize),
    startTextSize:Number(slide.textSize)
  };

  getBoxForTarget(target).setPointerCapture(event.pointerId);
}

function moveEditPointer(event){
  if(!editAction) return;

  event.preventDefault();

  const slide = getCurrentSlide();
  if(!slide) return;

  const dx = event.clientX - editAction.startClientX;
  const dy = event.clientY - editAction.startClientY;

  if(editAction.mode === "drag"){
    const moveXPercent = (dx / editAction.areaWidth) * 100;
    const moveYPercent = (dy / editAction.areaHeight) * 100;

    if(editAction.target === "image"){
      slide.imageX = editAction.startX + moveXPercent;
      slide.imageY = editAction.startY + moveYPercent;
    }else{
      slide.x = editAction.startX + moveXPercent;
      slide.y = editAction.startY + moveYPercent;
    }
  }

  if(editAction.mode === "resize"){
    const handle = editAction.handle;
    let delta = 0;
    let parts = 0;

    if(handle.includes("e")){ delta += dx; parts++; }
    if(handle.includes("w")){ delta += -dx; parts++; }
    if(handle.includes("s")){ delta += dy; parts++; }
    if(handle.includes("n")){ delta += -dy; parts++; }

    if(parts > 0){
      delta = delta / parts;
    }

    if(editAction.target === "image"){
      slide.imageSize = clamp(editAction.startImageSize + (delta * 2), 40, 1400);
    }else{
      slide.textSize = clamp(editAction.startTextSize + (delta * .45), 12, 260);
    }
  }

  showSlide(currentIndex, false);
}

function endEditPointer(){
  if(!editAction) return;
  editAction = null;
  markDirty();
}

imageBox.addEventListener("pointerdown", event=>beginEditPointer(event,"image"));
textBox.addEventListener("pointerdown", event=>beginEditPointer(event,"text"));
window.addEventListener("pointermove", moveEditPointer);
window.addEventListener("pointerup", endEditPointer);
window.addEventListener("pointercancel", endEditPointer);

overlayArea.addEventListener("pointerdown", event=>{
  if(event.target === overlayArea || event.target === animWrap || event.target === overlayContent){
    imageBox.classList.remove("selected");
    textBox.classList.remove("selected");
  }
});

    if(presetData){
      document.getElementById("presetSelect").value = presetFromUrl;
      await loadPreset(presetFromUrl);
      startOverlay();
      return;
    }
  }

  const lastPreset = localStorage.getItem("SILENCE_LAST_PRESET");

  if(lastPreset){
    const presetData = await getPresetFromDB(lastPreset);

    if(presetData){
      document.getElementById("presetSelect").value = lastPreset;
      await loadPreset(lastPreset);

      if(mode === "overlay"){
        startOverlay();
      }

      return;
    }
  }

  slides = [defaultSlide()];
  renderSlides();
  showSlide(0, true);
  selectEditTarget("image");
}

startup().then(()=>{
  if(!document.body.classList.contains("overlayOnly")){
    selectEditTarget("image");
  }
});
</script>
